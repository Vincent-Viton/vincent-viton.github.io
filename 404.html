<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Vincent Viton - Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to load the correct path for any
      // deep link across the whole SPA.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    <script type="text/javascript">
      // This script handles the redirect from github pages 404 to the main index.html
      // with the information about the missing path preserved in the query string.
      var path = window.location.pathname;
      window.location.replace(
        window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '') +
        '/?p=' + path.replace(/&/g, '~and~').replace(/\//g, '/') +
        '&q=' + window.location.search.replace(/&/g, '~and~').replace(/\//g, '/')
      );
    </script>
  </head>
  <body>
  </body>
</html>
